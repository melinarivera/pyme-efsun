<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Esotérico</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #060410;
  --surface: #0c0920;
  --surface2: #131028;
  --surface3: #1a1635;
  --purple: #6e52a8;
  --purple-light: #a480dc;
  --purple-dim: rgba(110,82,168,0.15);
  --gold: #c6a245;
  --gold-light: #e4c870;
  --gold-dim: rgba(198,162,69,0.13);
  --gold-border: rgba(198,162,69,0.22);
  --text: #eee8f8;
  --text-muted: #8c84b0;
  --text-dim: #484268;
  --border: rgba(164,128,220,0.11);
  --border-hover: rgba(164,128,220,0.28);
  --success: #52b882;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 6% 11%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 28% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 74% 18%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 78%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 4%, rgba(198,162,69,0.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 14% 42%, rgba(164,128,220,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 44% 88%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 82% 33%, rgba(255,255,255,0.4) 0%, transparent 100%);
}

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 40px;
  border-bottom: 1px solid var(--border);
  position: relative; z-index: 10;
  gap: 16px; flex-wrap: wrap;
}

.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 21px; font-weight: 300;
  color: var(--gold-light); letter-spacing: 0.1em; cursor: pointer;
}

.brand span { color: var(--text-muted); font-size: 12px; font-family: 'Raleway'; font-weight: 300; margin-left: 8px; letter-spacing: 0.08em; }

.topbar-cats {
  display: flex; gap: 4px; flex-wrap: wrap;
}

.topcat {
  background: none; border: 1px solid transparent;
  border-radius: 20px; padding: 5px 14px;
  font-family: 'Raleway', sans-serif; font-size: 12px;
  font-weight: 400; letter-spacing: 0.06em;
  color: var(--text-muted); cursor: pointer;
  transition: all 0.2s ease;
}

.topcat:hover { color: var(--text); border-color: var(--border); }

.topcat.active {
  color: var(--gold-light);
  border-color: var(--gold-border);
  background: var(--gold-dim);
}

/* ── VIEWS ── */
.view { display: none; position: relative; z-index: 1; }
.view.active { display: block; }

/* ── BLOG LIST ── */
.blog-hero {
  text-align: center;
  padding: 56px 40px 44px;
  opacity: 0; animation: fadeUp 0.7s ease forwards 0.1s;
}

.eyebrow {
  font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 12px;
}

.blog-hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 6vw, 58px); font-weight: 300; line-height: 1.1;
  margin-bottom: 12px;
}

.blog-hero h1 em { color: var(--gold-light); font-style: italic; }

.blog-hero p {
  font-size: 13px; color: var(--text-muted);
  letter-spacing: 0.06em;
}

/* ── FEATURED ── */
.featured-wrap {
  max-width: 1100px; margin: 0 auto; padding: 0 32px 48px;
  opacity: 0; animation: fadeUp 0.6s ease forwards 0.3s;
}

.featured-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden;
  display: grid; grid-template-columns: 1fr 1fr;
  cursor: pointer; transition: all 0.28s ease;
  position: relative;
}

.featured-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.featured-card:hover { border-color: var(--border-hover); transform: translateY(-3px); box-shadow: 0 16px 48px rgba(0,0,0,0.5); }

@media (max-width: 680px) { .featured-card { grid-template-columns: 1fr; } }

.featured-img {
  height: 340px; display: flex; align-items: center; justify-content: center;
  font-size: 90px; background: var(--surface2);
  position: relative; overflow: hidden;
}

.featured-img::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(110,82,168,0.08), rgba(198,162,69,0.04));
}

.featured-body {
  padding: 40px 36px; display: flex; flex-direction: column; justify-content: center; gap: 14px;
}

.art-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 12px;
  width: fit-content;
}

.art-tag.astro   { background: rgba(110,82,168,0.2); border: 1px solid rgba(164,128,220,0.3); color: var(--purple-light); }
.art-tag.ritual  { background: rgba(198,162,69,0.12); border: 1px solid var(--gold-border); color: var(--gold); }
.art-tag.luna    { background: rgba(200,200,255,0.08); border: 1px solid rgba(200,200,255,0.18); color: #c8c8f8; }
.art-tag.tarot   { background: rgba(220,100,140,0.1); border: 1px solid rgba(220,100,140,0.25); color: #e8a0b8; }
.art-tag.historia { background: rgba(100,180,140,0.1); border: 1px solid rgba(100,180,140,0.25); color: #90d4b0; }

.featured-body h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px; font-weight: 300; line-height: 1.25; color: var(--text);
}

.featured-body p { font-size: 14px; color: var(--text-muted); line-height: 1.7; }

.art-meta { display: flex; gap: 16px; align-items: center; font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; }
.art-meta span { display: flex; align-items: center; gap: 4px; }

.read-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--gold); letter-spacing: 0.1em;
  margin-top: 4px;
}

/* ── GRID ── */
.grid-wrap {
  max-width: 1100px; margin: 0 auto; padding: 0 32px 60px;
}

.section-label {
  font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 20px;
}

.art-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
  opacity: 0; animation: fadeUp 0.6s ease forwards 0.45s;
}

.art-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  cursor: pointer; transition: all 0.25s ease;
  display: flex; flex-direction: column;
}

.art-card:hover { border-color: var(--border-hover); transform: translateY(-3px); box-shadow: 0 12px 36px rgba(0,0,0,0.45); }

.art-img {
  height: 150px; display: flex; align-items: center; justify-content: center;
  font-size: 54px; background: var(--surface2); position: relative; overflow: hidden;
}

.art-img::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
  background: linear-gradient(to top, var(--surface), transparent);
}

.art-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

.art-body h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 400; line-height: 1.3; color: var(--text);
}

.art-body p { font-size: 12px; color: var(--text-muted); line-height: 1.6; flex: 1; }

.art-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em;
}

.art-footer span { display: flex; align-items: center; gap: 4px; }

/* ── ARTICLE VIEW ── */
.article-wrap {
  max-width: 780px; margin: 0 auto; padding: 40px 32px 80px;
}

.back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-muted); letter-spacing: 0.08em;
  cursor: pointer; margin-bottom: 32px;
  background: none; border: none; font-family: 'Raleway', sans-serif;
  font-weight: 300; transition: color 0.2s ease;
}

.back-btn:hover { color: var(--text); }

.art-hero-img {
  width: 100%; height: 280px;
  display: flex; align-items: center; justify-content: center;
  font-size: 100px; background: var(--surface2);
  border-radius: 16px; margin-bottom: 36px;
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
}

.art-hero-img::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(to top, var(--bg), transparent);
}

.art-header { margin-bottom: 32px; }

.art-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 5vw, 42px); font-weight: 300;
  line-height: 1.2; margin: 12px 0 16px; color: var(--text);
}

.art-header .art-meta { margin-bottom: 0; }

.art-content { font-size: 15px; color: var(--text-muted); line-height: 1.9; }

.art-content h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 400; color: var(--text);
  margin: 40px 0 16px;
}

.art-content h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 400; color: var(--gold-light);
  margin: 28px 0 12px;
}

.art-content p { margin-bottom: 20px; }

.art-content blockquote {
  border-left: 2px solid var(--gold-border);
  padding: 16px 24px; margin: 28px 0;
  background: var(--gold-dim);
  border-radius: 0 10px 10px 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-style: italic;
  color: var(--gold-light); line-height: 1.6;
}

.art-content ul { padding-left: 0; margin-bottom: 20px; list-style: none; }
.art-content ul li {
  padding: 6px 0 6px 20px; position: relative;
  font-size: 14px; color: var(--text-muted);
}

.art-content ul li::before {
  content: '✦'; position: absolute; left: 0;
  color: var(--gold); font-size: 10px; top: 9px;
}

.art-divider {
  display: flex; align-items: center; gap: 16px;
  margin: 40px 0; color: var(--text-dim); font-size: 16px;
}

.art-divider::before, .art-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── RELATED PRODUCTS ── */
.related-section {
  margin-top: 52px; padding-top: 32px;
  border-top: 1px solid var(--border);
}

.related-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 300; color: var(--gold-light);
  margin-bottom: 6px; letter-spacing: 0.05em;
}

.related-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 0.06em; margin-bottom: 20px; }

.related-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px;
}

.rel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  cursor: pointer; transition: all 0.22s ease;
}

.rel-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }

.rel-img {
  height: 110px; display: flex; align-items: center; justify-content: center;
  font-size: 40px; background: var(--surface2);
}

.rel-body { padding: 12px; }

.rel-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; font-weight: 400; color: var(--text);
  margin-bottom: 6px; line-height: 1.3;
}

.rel-footer {
  display: flex; align-items: center; justify-content: space-between;
}

.rel-price { font-size: 14px; color: var(--gold); }

.rel-add {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--gold-dim); border: 1px solid var(--gold-border);
  color: var(--gold-light); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s ease;
}

.rel-add:hover { background: rgba(198,162,69,0.22); }

/* ── COMMENTS ── */
.comments-section {
  margin-top: 52px; padding-top: 32px;
  border-top: 1px solid var(--border);
}

.comments-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 300; color: var(--text);
  margin-bottom: 24px; letter-spacing: 0.04em;
}

.comment-item {
  display: flex; gap: 14px;
  padding: 18px 0; border-bottom: 1px solid var(--border);
}

.comment-item:last-of-type { border-bottom: none; }

.comment-avatar {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  background: var(--purple-dim); border: 1px solid rgba(164,128,220,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500; color: var(--purple-light);
}

.comment-body { flex: 1; }

.comment-header {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; flex-wrap: wrap;
}

.comment-name { font-size: 13px; font-weight: 500; color: var(--text); }
.comment-date { font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; }

.comment-stars { display: flex; gap: 2px; margin-bottom: 6px; }
.star { font-size: 12px; color: var(--gold); }
.star.empty { color: var(--text-dim); }

.comment-text { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

.comment-reply {
  font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em;
  margin-top: 8px; cursor: pointer; background: none; border: none;
  font-family: 'Raleway', sans-serif; transition: color 0.2s ease;
}

.comment-reply:hover { color: var(--purple-light); }

/* New comment form */
.comment-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 24px;
  margin-top: 24px;
}

.form-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 300;
  color: var(--gold-light); margin-bottom: 18px; letter-spacing: 0.04em;
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }

.field label {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim);
}

.field input, .field textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 14px;
  color: var(--text); font-family: 'Raleway', sans-serif;
  font-size: 13px; font-weight: 300; outline: none;
  transition: border-color 0.2s ease;
}

.field input::placeholder, .field textarea::placeholder { color: var(--text-dim); }
.field input:focus, .field textarea:focus { border-color: rgba(198,162,69,0.4); }
.field textarea { min-height: 90px; resize: vertical; line-height: 1.6; }

.stars-input { display: flex; gap: 6px; }

.star-input {
  font-size: 20px; cursor: pointer; color: var(--text-dim);
  transition: color 0.15s ease; background: none; border: none;
  padding: 0; line-height: 1;
}

.star-input.lit { color: var(--gold); }

.btn-submit {
  background: var(--gold-dim); border: 1px solid var(--gold-border);
  border-radius: 8px; padding: 12px 24px;
  color: var(--gold-light);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 400; letter-spacing: 0.08em;
  cursor: pointer; transition: all 0.2s ease;
  margin-top: 4px;
}

.btn-submit:hover { border-color: var(--gold); background: rgba(198,162,69,0.22); }

.submit-msg {
  display: none; padding: 10px 14px; margin-top: 12px;
  background: rgba(82,184,130,0.1); border: 1px solid rgba(82,184,130,0.25);
  border-radius: 8px; font-size: 13px; color: var(--success);
  letter-spacing: 0.04em;
}

.submit-msg.show { display: block; }

.no-results {
  text-align: center; padding: 60px 20px;
  color: var(--text-dim); font-size: 14px; letter-spacing: 0.06em;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand" onclick="showList()">✦ Esotérica <span>/ Blog</span></div>
  <div class="topbar-cats" id="topCats"></div>
</div>

<!-- LIST VIEW -->
<div class="view active" id="listView">
  <div class="blog-hero">
    <p class="eyebrow">✦ Sabiduría ancestral ✦</p>
    <h1>El <em>grimorio</em> digital</h1>
    <p>Artículos, rituales y guías para tu camino esotérico</p>
  </div>

  <div class="featured-wrap" id="featuredWrap"></div>

  <div class="grid-wrap">
    <p class="section-label" id="gridLabel">Todos los artículos</p>
    <div class="art-grid" id="artGrid"></div>
  </div>
</div>

<!-- ARTICLE VIEW -->
<div class="view" id="articleView">
  <div class="article-wrap" id="articleWrap"></div>
</div>

<script>
// ── DATA ──
const CATS = [
  { id:'all',      label:'Todo',        cls:'' },
  { id:'astro',    label:'Astrología',  cls:'astro' },
  { id:'ritual',   label:'Rituales',    cls:'ritual' },
  { id:'luna',     label:'Luna',        cls:'luna' },
  { id:'tarot',    label:'Tarot',       cls:'tarot' },
  { id:'historia', label:'Tradición',   cls:'historia' },
];

const ARTICLES = [
  {
    id: 1, cat: 'luna', featured: true,
    icon: '🌕', title: 'Luna llena en Escorpio: ritual de liberación profunda',
    excerpt: 'Escorpio nos invita a soltar lo que ya no sirve. Esta luna llena trae consigo una energía de transformación intensa. Aprende el ritual completo para liberar ataduras y renacer.',
    date: '18 mar 2026', read: '8 min', comments: 14,
    content: `
<p>La Luna Llena en Escorpio es uno de los tránsitos más poderosos del año astrológico. Cuando la luna alcanza su punto máximo de luminosidad en el signo del escorpión, nos invita a descender a las profundidades de nuestra psique para sacar a la luz todo aquello que hemos mantenido en la oscuridad.</p>

<blockquote>La luna no esconde nada. En su plenitud, ilumina lo que el sol no se atreve a mirar.</blockquote>

<h2>¿Qué energía trae esta luna?</h2>

<p>Escorpio es un signo de agua fija, regido por Plutón y Marte. Su energía es intensa, magnética y transformadora. Durante esta luna llena, sentirás una atracción poderosa hacia la verdad, aunque esa verdad incomode. Las emociones que has reprimido durante semanas pedirán ser vistas y liberadas.</p>

<p>Los temas que se activarán son: relaciones de poder y control, sexualidad y deseo, herencias emocionales, miedos arraigados, y todo aquello que está listo para morir y renacer en tu vida.</p>

<h2>El ritual de liberación</h2>

<h3>Lo que necesitas</h3>
<ul>
  <li>Una vela negra (protección y corte)</li>
  <li>Una vela blanca (purificación y nuevo comienzo)</li>
  <li>Sal negra o sal del Himalaya</li>
  <li>Papel y bolígrafo negro</li>
  <li>Un cuenco resistente al fuego</li>
  <li>Palo santo o salvia para limpiar el espacio</li>
</ul>

<h3>Cómo realizarlo</h3>
<p>Comienza limpiando tu espacio con palo santo o salvia. Traza un círculo de sal alrededor de tu lugar de trabajo. Enciende primero la vela negra y después la blanca, colocándolas frente a frente.</p>

<p>En el papel, escribe todo lo que quieres liberar: relaciones que ya no te nutren, creencias limitantes, miedos, rencores. Sé específico y honesto. Esta es tu ofrenda a la luna.</p>

<blockquote>"Bajo esta luna llena, libero lo que ya no soy. Lo que fue, fue. Lo que vendrá, ya está en camino."</blockquote>

<p>Quema el papel de forma segura en el cuenco mientras visualizas cómo esas energías se transforman en luz. Deja que las velas se consuman por completo si es posible.</p>

<h2>Después del ritual</h2>
<p>Los días siguientes pueden ser emocionalmente intensos. Date permiso para sentir. Bebe mucha agua, descansa, y confía en que la luna ya ha puesto en marcha lo que pediste liberar.</p>
    `,
    products: [1, 2, 11, 20],
    comments_data: [
      { name: 'Valentina R.', avatar: 'VR', date: '19 mar 2026', stars: 5, text: 'Hice este ritual anoche y fue increíblemente poderoso. Lloré muchísimo pero después sentí una ligereza enorme. Gracias por compartir esto con tanto detalle.' },
      { name: 'Marta S.', avatar: 'MS', date: '20 mar 2026', stars: 5, text: 'Lo hice con mi vela negra del artículo y la combinación fue perfecta. ¿Hay algún ritual específico para la luna nueva que pudierais publicar?' },
      { name: 'Carmen L.', avatar: 'CL', date: '21 mar 2026', stars: 4, text: 'Muy bien explicado. Me gustaría saber si se puede hacer el ritual aunque no haya luna llena exacta en tu zona horaria o si vale el día antes/después.' },
    ]

let activeCat = 'all';
let starRating = 0;

// ── BUILD TOPBAR CATS ──
const topCats = document.getElementById('topCats');
CATS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'topcat' + (c.id === 'all' ? ' active' : '');
  btn.textContent = c.label;
  btn.onclick = () => {
    activeCat = c.id;
    document.querySelectorAll('.topcat').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
    showList();
  };
  topCats.appendChild(btn);
});

// ── RENDER LIST ──
function renderList() {
  const items = activeCat === 'all' ? ARTICLES : ARTICLES.filter(a => a.cat === activeCat);
  const featured = items.find(a => a.featured) || items[0];
  const rest = items.filter(a => a.id !== featured?.id);

  document.getElementById('gridLabel').textContent =
    activeCat === 'all' ? 'Todos los artículos' : CATS.find(c => c.id === activeCat)?.label || '';

  // Featured
  const fw = document.getElementById('featuredWrap');
  if (featured) {
    const tagCls = CATS.find(c => c.id === featured.cat)?.cls || '';
    const tagLabel = CATS.find(c => c.id === featured.cat)?.label || '';
    fw.innerHTML = `
      <div class="featured-card" onclick="openArticle(${featured.id})">
        <div class="featured-img">${featured.icon}</div>
        <div class="featured-body">
          <span class="art-tag ${tagCls}">${tagLabel}</span>
          <h2>${featured.title}</h2>
          <p>${featured.excerpt}</p>
          <div class="art-meta">
            <span>📅 ${featured.date}</span>
            <span>⏱ ${featured.read}</span>
            <span>💬 ${featured.comments}</span>
          </div>
          <span class="read-link">Leer artículo →</span>
        </div>
      </div>`;
  } else { fw.innerHTML = ''; }

  // Grid
  const grid = document.getElementById('artGrid');
  if (!rest.length) {
    grid.innerHTML = `<div class="no-results">No hay artículos en esta categoría aún</div>`;
    return;
  }
  grid.innerHTML = rest.map(a => {
    const tagCls = CATS.find(c => c.id === a.cat)?.cls || '';
    const tagLabel = CATS.find(c => c.id === a.cat)?.label || '';
    return `
    <div class="art-card" onclick="openArticle(${a.id})">
      <div class="art-img">${a.icon}</div>
      <div class="art-body">
        <span class="art-tag ${tagCls}">${tagLabel}</span>
        <h3>${a.title}</h3>
        <p>${a.excerpt}</p>
        <div class="art-footer">
          <span>📅 ${a.date}</span>
          <span>⏱ ${a.read}</span>
          <span>💬 ${a.comments}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── ARTICLE ──
function openArticle(id) {
  const a = ARTICLES.find(x => x.id === id);
  if (!a) return;
  const tagCls = CATS.find(c => c.id === a.cat)?.cls || '';
  const tagLabel = CATS.find(c => c.id === a.cat)?.label || '';

  const relProds = a.products.map(pid => {
    const p = PRODUCTS_MAP[pid];
    if (!p) return '';
    return `<div class="rel-card">
      <div class="rel-img">${p.icon}</div>
      <div class="rel-body">
        <p class="rel-name">${p.name}</p>
        <div class="rel-footer">
          <span class="rel-price">${p.price} €</span>
          <button class="rel-add" onclick="alert('Añadir al carrito: ${p.name}')">+</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const commentsHTML = a.comments_data.map(c => `
    <div class="comment-item">
      <div class="comment-avatar">${c.avatar}</div>
      <div class="comment-body">
        <div class="comment-header">
          <span class="comment-name">${c.name}</span>
          <span class="comment-date">${c.date}</span>
        </div>
        <div class="comment-stars">${[1,2,3,4,5].map(s => `<span class="star${s <= c.stars ? '' : ' empty'}">★</span>`).join('')}</div>
        <p class="comment-text">${c.text}</p>
        <button class="comment-reply">Responder</button>
      </div>
    </div>`).join('');

  document.getElementById('articleWrap').innerHTML = `
    <button class="back-btn" onclick="showList()">← Volver al blog</button>
    <div class="art-hero-img">${a.icon}</div>
    <div class="art-header">
      <span class="art-tag ${tagCls}">${tagLabel}</span>
      <h1>${a.title}</h1>
      <div class="art-meta">
        <span>📅 ${a.date}</span>
        <span>⏱ ${a.read} de lectura</span>
        <span>💬 ${a.comments_data.length} comentarios</span>
      </div>
    </div>
    <div class="art-content">${a.content}</div>

    <div class="art-divider">✦</div>

    <div class="related-section">
      <p class="related-title">Productos relacionados</p>
      <p class="related-sub">Artículos de nuestra tienda para acompañar este ritual</p>
      <div class="related-grid">${relProds}</div>
    </div>

    <div class="comments-section">
      <h3 class="comments-title">Comentarios (${a.comments_data.length})</h3>
      ${commentsHTML}

      <div class="comment-form">
        <p class="form-title">Deja tu comentario</p>
        <div class="form-row">
          <div class="field"><label>Nombre</label><input type="text" placeholder="Tu nombre" id="cName"></div>
          <div class="field"><label>Email</label><input type="email" placeholder="tu@email.com" id="cEmail"></div>
        </div>
        <div class="field" style="margin-bottom:12px;">
          <label>Valoración</label>
          <div class="stars-input" id="starsInput">
            ${[1,2,3,4,5].map(s => `<button class="star-input" data-val="${s}" onclick="setStars(${s})">★</button>`).join('')}
          </div>
        </div>
        <div class="field">
          <label>Comentario</label>
          <textarea placeholder="Comparte tu experiencia, pregunta o reflexión…" id="cText"></textarea>
        </div>
        <button class="btn-submit" onclick="submitComment()">✦ Publicar comentario</button>
        <div class="submit-msg" id="submitMsg">¡Gracias! Tu comentario será revisado y publicado pronto.</div>
      </div>
    </div>`;

  document.getElementById('listView').classList.remove('active');
  document.getElementById('articleView').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  starRating = 0;
}

function showList() {
  document.getElementById('articleView').classList.remove('active');
  document.getElementById('listView').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setStars(val) {
  starRating = val;
  document.querySelectorAll('.star-input').forEach(btn => {
    btn.classList.toggle('lit', parseInt(btn.dataset.val) <= val);
  });
}

function submitComment() {
  const name = document.getElementById('cName')?.value.trim();
  const text = document.getElementById('cText')?.value.trim();
  if (!name || !text) { alert('Por favor escribe tu nombre y comentario.'); return; }
  const msg = document.getElementById('submitMsg');
  if (msg) { msg.classList.add('show'); }
  document.getElementById('cName').value = '';
  document.getElementById('cEmail').value = '';
  document.getElementById('cText').value = '';
  setStars(0);
}

// ── INIT ──
renderList();
</script>
</body>
