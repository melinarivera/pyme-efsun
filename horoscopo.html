<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horóscopo IA — Tienda Esotérica</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080612;
    --surface: #110e20;
    --surface2: #1a1530;
    --purple: #6b4fa0;
    --purple-light: #9b79d4;
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --gold-dim: #7a6030;
    --text: #ede8f5;
    --text-muted: #9088aa;
    --text-dim: #5a5270;
    --border: rgba(155, 121, 212, 0.15);
    --border-gold: rgba(201, 168, 76, 0.2);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 32% 58%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 67% 23%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 71%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 91% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 7% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 5%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 23% 33%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 76% 88%, rgba(155,121,212,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 38% 47%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 62% 62%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 4% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Nebula glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(80, 40, 140, 0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    padding: 48px 0 32px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-family: 'Raleway', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(38px, 7vw, 62px);
    line-height: 1.1;
    letter-spacing: 0.02em;
    color: var(--text);
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.4s;
  }

  h1 em {
    color: var(--gold-light);
    font-style: italic;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
  }

  /* STEP INDICATOR */
  .steps {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 40px 0 48px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.7s;
  }

  .step-item {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .step-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    transition: all 0.4s ease;
    background: var(--surface);
    position: relative;
  }

  .step-dot.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201, 168, 76, 0.1);
    box-shadow: 0 0 12px rgba(201, 168, 76, 0.2);
  }

  .step-dot.done {
    border-color: var(--purple-light);
    background: rgba(107, 79, 160, 0.3);
    color: var(--purple-light);
  }

  .step-line {
    width: 48px;
    height: 1px;
    background: var(--border);
    transition: background 0.4s ease;
  }

  .step-line.done {
    background: rgba(107, 79, 160, 0.4);
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.3), transparent);
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 28px;
  }

  /* ZODIAC GRID */
  .zodiac-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  @media (max-width: 600px) {
    .zodiac-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .sign-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.25s ease;
    color: var(--text-muted);
    font-family: 'Raleway', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .sign-btn:hover {
    border-color: rgba(201, 168, 76, 0.4);
    color: var(--gold-light);
    background: rgba(201, 168, 76, 0.05);
    transform: translateY(-2px);
  }

  .sign-btn.selected {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201, 168, 76, 0.1);
    box-shadow: 0 0 16px rgba(201, 168, 76, 0.15), inset 0 0 12px rgba(201, 168, 76, 0.05);
  }

  .sign-symbol {
    font-size: 26px;
    line-height: 1;
  }

  /* AREA SELECTOR */
  .area-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .area-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.25s ease;
    color: var(--text-muted);
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.05em;
    text-align: left;
  }

  .area-btn:hover {
    border-color: rgba(155, 121, 212, 0.4);
    color: var(--text);
    background: rgba(107, 79, 160, 0.08);
  }

  .area-btn.selected {
    border-color: var(--purple-light);
    color: var(--text);
    background: rgba(107, 79, 160, 0.15);
    box-shadow: 0 0 16px rgba(107, 79, 160, 0.12);
  }

  .area-icon {
    font-size: 22px;
    flex-shrink: 0;
  }

  .area-info small {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: 0.03em;
  }

  /* DATE INPUT */
  .date-input-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .date-input-row input[type="date"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s ease;
    -webkit-appearance: none;
    color-scheme: dark;
  }

  .date-input-row input[type="date"]:focus {
    border-color: rgba(201, 168, 76, 0.5);
  }

  .date-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 0.04em;
  }

  /* GENERATE BUTTON */
  .btn-generate {
    width: 100%;
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.15), rgba(107, 79, 160, 0.15));
    border: 1px solid var(--gold-dim);
    border-radius: 12px;
    padding: 18px 32px;
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-generate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(107,79,160,0.08));
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .btn-generate:hover:not(:disabled)::before { opacity: 1; }

  .btn-generate:hover:not(:disabled) {
    border-color: var(--gold);
    box-shadow: 0 0 24px rgba(201, 168, 76, 0.2), 0 0 48px rgba(107, 79, 160, 0.1);
    transform: translateY(-1px);
  }

  .btn-generate:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* LOADING STATE */
  .loading-state {
    display: none;
    text-align: center;
    padding: 40px 0;
  }

  .loading-state.visible { display: block; }

  .oracle-ring {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1px solid var(--border-gold);
    border-top-color: var(--gold);
    animation: spin 1.4s linear infinite;
    margin: 0 auto 20px;
    position: relative;
  }

  .oracle-ring::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 1px solid transparent;
    border-top-color: var(--purple-light);
    animation: spin 0.9s linear infinite reverse;
  }

  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--text-muted);
    animation: pulse 2s ease-in-out infinite;
  }

  /* RESULT */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border-gold);
    border-radius: 16px;
    padding: 40px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease forwards;
  }

  .result-card.visible { display: block; }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .result-card::after {
    content: '';
    position: absolute;
    bottom: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(107, 79, 160, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .result-sign-badge {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 1px solid var(--border-gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    background: rgba(201, 168, 76, 0.08);
    flex-shrink: 0;
  }

  .result-meta {
    flex: 1;
  }

  .result-sign-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold-light);
    margin-bottom: 2px;
  }

  .result-area-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--purple-light);
    text-transform: uppercase;
  }

  .result-date-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .result-body {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 300;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
    min-height: 60px;
  }

  .result-footer {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    color: var(--text-muted);
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-secondary:hover {
    border-color: var(--purple-light);
    color: var(--purple-light);
  }

  .btn-cta {
    background: rgba(201, 168, 76, 0.1);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    padding: 10px 18px;
    color: var(--gold-light);
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-cta:hover {
    border-color: var(--gold);
    background: rgba(201, 168, 76, 0.18);
  }

  .section {
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  .section:nth-child(1) { animation-delay: 0.8s; }
  .section:nth-child(2) { animation-delay: 0.95s; }
  .section:nth-child(3) { animation-delay: 1.1s; }

  /* ERROR */
  .error-msg {
    display: none;
    background: rgba(180, 60, 60, 0.1);
    border: 1px solid rgba(180, 60, 60, 0.3);
    border-radius: 10px;
    padding: 14px 18px;
    color: #e08080;
    font-size: 13px;
    margin-top: 16px;
    letter-spacing: 0.03em;
  }

  .error-msg.visible { display: block; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ORACLE LABEL */
  .oracle-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(107, 79, 160, 0.15);
    border: 1px solid rgba(107, 79, 160, 0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--purple-light);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .oracle-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--purple-light);
    animation: pulse 2s ease-in-out infinite;
  }

  /* DECORATIVE LINE */
  .deco-line {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 0 auto 32px;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <p class="eyebrow">✦ Oráculo Digital ✦</p>
    <h1>Tu horóscopo<br><em>personal</em></h1>
    <p class="subtitle">Lecturas generadas por inteligencia artificial con energía cósmica</p>
  </header>

  <div class="steps" id="steps">
    <div class="step-item">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-line" id="line1"></div>
    </div>
    <div class="step-item">
      <div class="step-dot" id="dot2">2</div>
      <div class="step-line" id="line2"></div>
    </div>
    <div class="step-item">
      <div class="step-dot" id="dot3">3</div>
    </div>
  </div>

  <div class="section card">
    <p class="card-title">I — Elige tu signo zodiacal</p>
    <div class="zodiac-grid" id="zodiacGrid">
    </div>
  </div>

  <div class="section card">
    <p class="card-title">II — Fecha de nacimiento</p>
    <div class="date-input-row">
      <input type="date" id="birthDate" max="2010-12-31" min="1920-01-01">
    </div>
    <p class="date-hint">Tu fecha afinará la lectura con tu carta natal</p>
  </div>

  <div class="section card">
    <p class="card-title">III — Área de consulta</p>
    <div class="area-grid" id="areaGrid"></div>
  </div>

  <button class="btn-generate" id="btnGenerate" disabled onclick="generateReading()">
    ✦ &nbsp; Revelar mi lectura &nbsp; ✦
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="loading-state" id="loadingState">
    <div class="oracle-ring"></div>
    <p class="loading-text">El oráculo consulta los astros…</p>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-sign-badge" id="rBadge"></div>
      <div class="result-meta">
        <div class="result-sign-name" id="rSign"></div>
        <div class="result-area-label" id="rArea"></div>
        <div class="result-date-label" id="rDate"></div>
      </div>
      <div class="oracle-badge"><span class="oracle-dot"></span>IA · Lectura en vivo</div>
    </div>
    <div class="result-body" id="resultBody"></div>
    <div class="result-footer">
      <button class="btn-secondary" onclick="resetReading()">← Nueva lectura</button>
      <button class="btn-secondary" onclick="copyReading()">Copiar lectura</button>
      <button class="btn-cta">Reservar sesión completa →</button>
    </div>
  </div>

  <div style="height: 60px;"></div>

</div>

<script>
const SIGNS = [
  { name: "Aries",       symbol: "♈", dates: "21 mar – 19 abr", element: "Fuego" },
  { name: "Tauro",       symbol: "♉", dates: "20 abr – 20 may", element: "Tierra" },
  { name: "Géminis",     symbol: "♊", dates: "21 may – 20 jun", element: "Aire" },
  { name: "Cáncer",      symbol: "♋", dates: "21 jun – 22 jul", element: "Agua" },
  { name: "Leo",         symbol: "♌", dates: "23 jul – 22 ago", element: "Fuego" },
  { name: "Virgo",       symbol: "♍", dates: "23 ago – 22 sep", element: "Tierra" },
  { name: "Libra",       symbol: "♎", dates: "23 sep – 22 oct", element: "Aire" },
  { name: "Escorpio",    symbol: "♏", dates: "23 oct – 21 nov", element: "Agua" },
  { name: "Sagitario",   symbol: "♐", dates: "22 nov – 21 dic", element: "Fuego" },
  { name: "Capricornio", symbol: "♑", dates: "22 dic – 19 ene", element: "Tierra" },
  { name: "Acuario",     symbol: "♒", dates: "20 ene – 18 feb", element: "Aire" },
  { name: "Piscis",      symbol: "♓", dates: "19 feb – 20 mar", element: "Agua" },
];

const AREAS = [
  { id: "amor",    label: "Amor y relaciones",  icon: "♡", desc: "Vínculos, pareja, corazón" },
  { id: "trabajo", label: "Trabajo y dinero",    icon: "◈", desc: "Carrera, abundancia, proyectos" },
  { id: "salud",   label: "Salud y energía",     icon: "◉", desc: "Bienestar, cuerpo, vitalidad" },
  { id: "consejo", label: "Consejo del día",      icon: "✦", desc: "Mensaje cósmico especial" },
];

let selectedSign = null;
let selectedArea = null;

// Build zodiac grid
const grid = document.getElementById('zodiacGrid');
SIGNS.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'sign-btn';
  btn.innerHTML = `<span class="sign-symbol">${s.symbol}</span><span>${s.name}</span>`;
  btn.title = `${s.dates} · ${s.element}`;
  btn.onclick = () => selectSign(i, btn);
  grid.appendChild(btn);
});

// Build area grid
const areaGrid = document.getElementById('areaGrid');
AREAS.forEach((a, i) => {
  const btn = document.createElement('button');
  btn.className = 'area-btn';
  btn.innerHTML = `<span class="area-icon">${a.icon}</span><div class="area-info"><span>${a.label}</span><small>${a.desc}</small></div>`;
  btn.onclick = () => selectArea(i, btn);
  areaGrid.appendChild(btn);
});

function selectSign(i, btn) {
  document.querySelectorAll('.sign-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedSign = SIGNS[i];
  updateSteps();
  checkReady();
}

function selectArea(i, btn) {
  document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedArea = AREAS[i];
  updateSteps();
  checkReady();
}

function updateSteps() {
  const d1 = document.getElementById('dot1');
  const d2 = document.getElementById('dot2');
  const d3 = document.getElementById('dot3');
  const l1 = document.getElementById('line1');
  const l2 = document.getElementById('line2');

  if (selectedSign) { d1.className = 'step-dot done'; l1.className = 'step-line done'; }
  if (document.getElementById('birthDate').value) { d2.className = 'step-dot done'; l2.className = 'step-line done'; }
  if (selectedArea) { d3.className = 'step-dot done'; }

  const active = !selectedSign ? 1 : !document.getElementById('birthDate').value ? 2 : 3;
  if (active === 1) d1.className = 'step-dot active';
  else if (active === 2 && !document.getElementById('birthDate').value) d2.className = 'step-dot active';
  else if (active === 3 && !selectedArea) d3.className = 'step-dot active';
}

document.getElementById('birthDate').addEventListener('change', () => {
  updateSteps();
  checkReady();
});

function checkReady() {
  const btn = document.getElementById('btnGenerate');
  const date = document.getElementById('birthDate').value;
  btn.disabled = !(selectedSign && selectedArea && date);
}

async function generateReading() {
  const date = document.getElementById('birthDate').value;
  if (!selectedSign || !selectedArea || !date) return;

  document.getElementById('btnGenerate').style.display = 'none';
  document.getElementById('loadingState').classList.add('visible');
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('errorMsg').classList.remove('visible');

  const birthDate = new Date(date);
  const formattedDate = birthDate.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

  const prompt = `Eres un oráculo esotérico con profundo conocimiento de astrología, misticismo y espiritualidad. Tu tono es evocador, poético y profundo, con metáforas cósmicas y referencias a los elementos.

El usuario nació el ${formattedDate} bajo el signo de ${selectedSign.name} (${selectedSign.element}). Quiere una lectura sobre: ${selectedArea.label}.

Escribe una lectura de horóscopo personal en español de aproximadamente 180-220 palabras. La lectura debe:
- Comenzar con una frase poética corta que invite a la reflexión
- Hacer referencias específicas al elemento ${selectedSign.element} y a la energía de ${selectedSign.name}
- Dar un mensaje claro y personal sobre el área de ${selectedArea.label}
- Mencionar algún planeta, luna o tránsito relevante de forma natural
- Terminar con una afirmación o consejo concreto
- Usar un lenguaje bello, íntimo y misterioso, no genérico

No uses asteriscos ni markdown. Escribe en prosa fluida con párrafos cortos.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();

    if (!response.ok) throw new Error(data.error?.message || 'Error del oráculo');

    const text = data.content[0]?.text || '';

    document.getElementById('loadingState').classList.remove('visible');
    document.getElementById('resultCard').classList.add('visible');
    document.getElementById('rBadge').textContent = selectedSign.symbol;
    document.getElementById('rSign').textContent = `${selectedSign.name} · ${selectedSign.element}`;
    document.getElementById('rArea').textContent = selectedArea.label;
    document.getElementById('rDate').textContent = `Nacimiento: ${formattedDate}`;
    document.getElementById('resultBody').textContent = '';

    // Typewriter effect
    let i = 0;
    const body = document.getElementById('resultBody');
    function typeChar() {
      if (i < text.length) {
        body.textContent += text[i++];
        setTimeout(typeChar, 12);
      }
    }
    typeChar();

  } catch (err) {
    document.getElementById('loadingState').classList.remove('visible');
    document.getElementById('btnGenerate').style.display = 'block';
    const errEl = document.getElementById('errorMsg');
    errEl.textContent = 'El oráculo no puede conectarse en este momento. Por favor, intenta de nuevo.';
    errEl.classList.add('visible');
    console.error(err);
  }
}

function resetReading() {
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('btnGenerate').style.display = 'block';
  document.getElementById('btnGenerate').disabled = true;
  document.querySelectorAll('.sign-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('birthDate').value = '';
  selectedSign = null;
  selectedArea = null;
  updateSteps();
}

function copyReading() {
  const text = document.getElementById('resultBody').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'Copiado ✓';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
</script>
</body>
</html>
